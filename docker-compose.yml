services:

  # ─── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: admin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── WebApi principal (puerto 8080) ───────────────────────────
  webapi:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: admin-webapi
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:5001
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Jwt__SecretKey=${JWT_SECRET}
      - Jwt__Issuer=AdminServices
      - Jwt__Audience=AdminServicesClient
      - Jwt__ExpirationInHours=24
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  # ─── MCP Server (puerto 5100) ─────────────────────────────────
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: admin-mcp-server
    restart: unless-stopped
    ports:
      - "5100:5100"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - McpServer__ApiKey=${MCP_API_KEY}
      - Jwt__SecretKey=${JWT_SECRET}
      - Jwt__Issuer=AdminServices
      - Jwt__Audience=AdminServicesClient
      - Jwt__ExpirationInHours=24
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge
